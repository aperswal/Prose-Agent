name = "prose-agent"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[observability]
enabled = true

[observability.logs]
enabled = true

# Native per-IP rate limiting: 100 requests per 60 seconds, applied to POST routes
# (/analyze and /mcp). Tune limit/period here; period must be 10 or 60.
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 100, period = 60 }
